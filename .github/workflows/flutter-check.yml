name: Flutter CI with Branch Check and Slack Notification

permissions:
  contents: write

on:
  pull_request:

jobs:
  flutter-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        ref: ${{ github.head_ref || github.ref_name }}
        fetch-depth: 0

    - name: Check branch name
      run: |
        BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
        echo "🔎 Branch: $BRANCH_NAME"
        if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "merge" ]]; then
          echo "✅ Branch check skipped for main/merge"
          exit 0
        fi
        if [[ ! "${BRANCH_NAME,,}" =~ ^(feature|bugfix|hotfix)/ && "$BRANCH_NAME" != "develop" ]]; then
          echo "❌ Branch name must start with feature/, bugfix/, or hotfix/, or be develop"
          exit 1
        fi
        echo "✅ Branch name is valid"

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.3'

    - name: Install dependencies
      run: flutter pub get

    - name: Format code
      run: |
        dart format .
        if [[ -n $(git status --porcelain) ]]; then
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Apply dart format changes"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
        fi

    - name: Generate localization files
      run: flutter pub run easy_localization:generate -S assets/translations -f keys -o locale_keys.g.dart

    - name: Run build_runner
      run: flutter pub run build_runner build --delete-conflicting-outputs

    - name: Run linting
      run: flutter analyze

    - name: Run tests
      run: flutter test

    - name: Notify Slack on PR
      if: github.event_name == 'pull_request'
      run: |
        PR_TITLE="${{ github.event.pull_request.title }}"
        PR_AUTHOR="${{ github.event.pull_request.user.login }}"
        PR_URL="${{ github.event.pull_request.html_url }}"
        BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
        curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"<!channel> 📣 *New Pull Request Created!*\",
            \"attachments\": [
              {
                \"color\": \"#36a64f\",
                \"fields\": [
                  { \"title\": \"Title\", \"value\": \"$PR_TITLE\", \"short\": false },
                  { \"title\": \"Author\", \"value\": \"$PR_AUTHOR\", \"short\": true },
                  { \"title\": \"Branch\", \"value\": \"$BRANCH_NAME\", \"short\": true },
                  { \"title\": \"URL\", \"value\": \"$PR_URL\", \"short\": false }
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
